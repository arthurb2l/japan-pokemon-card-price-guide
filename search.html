<script>
let allCards = [], filteredCards = [], currentView = 'grid', currency = 'JPY', currentGame = 'pokemon';
let collFilterActive = false;
const rarityOrder = ['Common','Uncommon','Rare','Double Rare','Ultra Rare','Illustration Rare','Special Art Rare','Hyper Rare','Shiny Rare','ACE SPEC Rare',
  'C','UC','R','SR','SEC','L','SP','P','DON!!','Promo']; // One Piece rarities
// Static rates - JPY base (primary currency for Japan tourists)
const rates = { JPY: 1, USD: 0.0067, EUR: 0.0062 };

// Auth state
let currentUser = null;
let userCollection = {};

// Collection Store (localStorage + Firestore when logged in)
const collectionStore = {
  _key: 'tcg_collection',
  _local() { return JSON.parse(localStorage.getItem(this._key) || '{}'); },
  _saveLocal(data) { localStorage.setItem(this._key, JSON.stringify(data)); },
  
  async add(cardId) {
    if (currentUser) {
      userCollection[cardId] = true;
      await db.collection('users').doc(currentUser.uid).collection('cards').doc(cardId).set({ owned: true, addedAt: Date.now() });
    } else {
      const d = this._local(); d[cardId] = true; this._saveLocal(d);
    }
    this._updateCount();
  },
  
  async remove(cardId) {
    if (currentUser) {
      delete userCollection[cardId];
      await db.collection('users').doc(currentUser.uid).collection('cards').doc(cardId).delete();
    } else {
      const d = this._local(); delete d[cardId]; this._saveLocal(d);
    }
    this._updateCount();
  },
  
  has(cardId) {
    return currentUser ? !!userCollection[cardId] : !!this._local()[cardId];
  },
  
  async toggle(cardId) {
    this.has(cardId) ? await this.remove(cardId) : await this.add(cardId);
    return this.has(cardId);
  },
  
  count() {
    return currentUser ? Object.keys(userCollection).length : Object.keys(this._local()).length;
  },
  
  getAll() {
    return currentUser ? userCollection : this._local();
  },
  
  _updateCount() { document.getElementById('coll-count').textContent = this.count(); }
};

// Auth functions
function signInWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err => {
    console.error('Sign in error:', err);
    showToast('Sign in failed');
  });
}

function signOut() {
  auth.signOut();
}

async function loadUserCollection(uid) {
  userCollection = {};
  const snapshot = await db.collection('users').doc(uid).collection('cards').get();
  snapshot.forEach(doc => { userCollection[doc.id] = true; });
  collectionStore._updateCount();
  renderCards();
}

async function migrateLocalToCloud(uid) {
  const local = JSON.parse(localStorage.getItem('tcg_collection') || '{}');
  const cardIds = Object.keys(local);
  if (cardIds.length === 0) return;
  
  const batch = db.batch();
  const userCardsRef = db.collection('users').doc(uid).collection('cards');
  cardIds.forEach(cardId => {
    batch.set(userCardsRef.doc(cardId), { owned: true, addedAt: Date.now() });
  });
  await batch.commit();
  localStorage.removeItem('tcg_collection');
  showToast(`Migrated ${cardIds.length} cards to cloud`);
}

// Auth state listener
auth.onAuthStateChanged(async user => {
  const container = document.getElementById('auth-container');
  if (user) {
    currentUser = user;
    container.innerHTML = `
      <div class="user-info">
        <img src="${user.photoURL || ''}" alt="" referrerpolicy="no-referrer">
        <span>${user.displayName || user.email}</span>
        <button class="signout-btn" onclick="signOut()">Sign out</button>
      </div>`;
    // Migrate local collection if exists
    const local = localStorage.getItem('tcg_collection');
    if (local && Object.keys(JSON.parse(local)).length > 0) {
      await migrateLocalToCloud(user.uid);
    }
    await loadUserCollection(user.uid);
    updateSaveCloudBtn();
  } else {
    currentUser = null;
    userCollection = {};
    container.innerHTML = `
      <button class="auth-btn" onclick="signInWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
        Sign in
      </button>`;
    collectionStore._updateCount();
    renderCards();
    updateSaveCloudBtn();
  }
});

async function toggleCollection(e, cardId) {
  e.stopPropagation();
  const owned = await collectionStore.toggle(cardId);
  const item = e.target.closest('.card-item');
  item.classList.toggle('owned', owned);
  showToast(owned ? '✓ Added to collection' : '✗ Removed from collection');
  if (collFilterActive && !owned) item.style.display = 'none';
}

function showToast(msg) {
  const t = document.getElementById('coll-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function toggleCollFilter() {
  collFilterActive = !collFilterActive;
  document.getElementById('coll-filter').classList.toggle('active', collFilterActive);
  displayLimit = 60; // Reset limit when toggling
  renderCards();
  updateStats();
  updateSaveCloudBtn();
}

function updateSaveCloudBtn() {
  const btn = document.getElementById('save-cloud-btn');
  const count = collectionStore.count();
  // Show if: not logged in AND has collection AND viewing collection
  btn.style.display = (!currentUser && count > 0 && collFilterActive) ? 'inline-block' : 'none';
}

async function saveToCloud() {
  await signInWithGoogle();
  // Migration happens automatically in onAuthStateChanged
}

function formatPrice(card) {
  if (card.pricing) {
    // Simple USD format (One Piece, DON cards, etc.)
    if (card.pricing.usd) {
      if (currency === 'USD') return '$' + card.pricing.usd.toFixed(2);
      if (currency === 'EUR') return '€' + (card.pricing.eur || card.pricing.usd * 0.92).toFixed(2);
      if (currency === 'JPY') return '¥' + Math.round(card.pricing.usd * 150).toLocaleString();
      return '$' + card.pricing.usd.toFixed(2);
    }
    // TCGdex format (Pokemon)
    const tcg = card.pricing.tcgplayer;
    const cm = card.pricing.cardmarket;
    if (currency === 'USD' && tcg?.normal?.marketPrice) return '$' + tcg.normal.marketPrice.toFixed(2);
    if (currency === 'USD' && tcg?.holofoil?.marketPrice) return '$' + tcg.holofoil.marketPrice.toFixed(2);
    if (cm?.trend) {
      if (currency === 'EUR') return '€' + cm.trend.toFixed(2);
      if (currency === 'JPY') return '¥' + Math.round(cm.trend * 162).toLocaleString();
      return '$' + (cm.trend * 1.08).toFixed(2);
    }
  }
  return '-';
}

function setCurrency(c) {
  currency = c;
  localStorage.setItem('tcg-currency', c);
  renderCards();
}

async function loadCards() {
  // Load saved currency
  const saved = localStorage.getItem('tcg-currency');
  if (saved) { currency = saved; document.getElementById('currency').value = saved; }
  
  try {
    // Try sharded data first, fallback to monolithic
    let pokemonCards = [];
    try {
      const manifest = await fetch('data/shards/manifest.json').then(r => r.json());
      const shardPromises = Object.values(manifest.shards).map(s => 
        fetch(`data/shards/${s.file}`).then(r => r.json())
      );
      const shards = await Promise.all(shardPromises);
      pokemonCards = shards.flatMap(s => Object.values(s.sets).flat()).map(c => ({...c, game: 'pokemon'}));
    } catch(e) {
      // Fallback to monolithic
      const pokemonRes = await fetch('data/brain-cache.json');
      const pokemonData = await pokemonRes.json();
      pokemonCards = Object.values(pokemonData.sets).flat().map(c => ({...c, game: 'pokemon'}));
    }
    
    // Load One Piece cards
    let opCards = [];
    try {
      const opRes = await fetch('data/onepiece-cache.json');
      const opData = await opRes.json();
      opCards = Object.values(opData.sets).flat().map(c => ({...c, game: 'onepiece'}));
    } catch(e) { console.log('No One Piece data'); }
    
    allCards = [...pokemonCards, ...opCards];
    
    // Populate set filter (respects game filter)
    // Check URL params
    const params = new URLSearchParams(location.search);
    if (params.get('game')) filterByGame(params.get('game'));
    else filterByGame(currentGame);
    
    // Set finish filter from URL
    if (params.get('finish')) {
      document.getElementById('finish-filter').value = params.get('finish');
    }
    
    if (params.get('q')) {
      document.getElementById('search').value = params.get('q');
      doSearch();
    } else if (params.get('set')) {
      document.getElementById('set-filter').value = params.get('set');
      filterBySet(params.get('set'));
    } else if (params.get('random')) {
      const gameCards = getGameCards();
      const card = gameCards[Math.floor(Math.random() * gameCards.length)];
      showCard(card.id);
      filteredCards = gameCards;
      applyFinishFilter();
      renderCards();
    } else {
      filteredCards = getGameCards();
      applyFinishFilter();
      renderCards();
    }
    updateStats();
  } catch (e) {
    document.getElementById('stats').textContent = 'Error loading';
  }
}

let displayLimit = 60;

function updateStats() {
  let total = filteredCards.length;
  if (collFilterActive) {
    const coll = collectionStore.getAll();
    total = filteredCards.filter(c => coll[c.id]).length;
  }
  const showing = Math.min(total, displayLimit);
  document.getElementById('stats').textContent = 
    total + ' cards' + (total > displayLimit ? ` (showing ${showing})` : '');
  document.getElementById('show-more-container').style.display = 
    total > displayLimit ? 'block' : 'none';
}

function showMore() {
  displayLimit += 60;
  renderCards();
  updateStats();
}

function renderCards() {
  const grid = document.getElementById('results');
  const noResults = document.getElementById('no-results');
  
  // Filter by collection FIRST if active
  let cards = filteredCards;
  if (collFilterActive) {
    const coll = collectionStore.getAll();
    cards = cards.filter(c => coll[c.id]);
  }
  
  // Then apply display limit
  cards = cards.slice(0, displayLimit);
  
  if (!cards.length) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';
  
  const proxyImg = url => url?.includes('onepiece-cardgame.com') ? `https://wsrv.nl/?url=${encodeURIComponent(url)}` : url;
  const getImg = c => proxyImg(c.imgJp) || (c.game === 'onepiece' ? proxyImg(c.img) : c.image + '/low.webp') || 'onepiece/images/card-back.png';
  const getImgHigh = c => proxyImg(c.imgJp) || (c.game === 'onepiece' ? proxyImg(c.img) : c.image + '/high.webp') || 'onepiece/images/card-back.png';
  const imgErr = "this.style.opacity='0.3';this.style.background='#ddd'";
  const jpName = c => c.nameJp ? `<span style="color:#7c3aed;font-size:.8em"> ${c.nameJp}</span>` : '';
  const variant = c => c.variant ? `<span style="color:#888;font-size:.85em"> (${c.variant})</span>` : '';
  const owned = c => collectionStore.has(c.id) ? ' owned' : '';
  const collBtn = c => `<div class="coll-dot"></div><div class="coll-add" onclick="toggleCollection(event,'${c.id}')">+</div>`;
  const flipBtn = c => c.imgEn ? `<button class="flip-tile" onclick="flipTile(event,this)" data-jp="${proxyImg(c.imgJp||c.img)}" data-en="${proxyImg(c.imgEn)}">EN</button>` : '';
  
  // Foil badge helper
  const foilBadge = c => {
    if (!c.finish || c.finish === 'regular') return '';
    if (c.finish === 'alternate-art') return '<span class="foil-badge alt-art">AA</span>';
    if (c.finish.startsWith('parallel')) return `<span class="foil-badge parallel">${c.finish.replace('parallel-','P')}</span>`;
    return '';
  };
  const finishLabel = c => {
    if (!c.finish) return '?';
    if (c.finish === 'regular') return 'Regular';
    if (c.finish === 'alternate-art') return 'Alt Art';
    if (c.finish.startsWith('parallel')) return c.finish.replace('parallel-','Parallel ');
    return c.finish;
  };
  
  if (currentView === 'checklist') {
    grid.innerHTML = `<div class="card-item header">
        <span></span>
        <span class="name" onclick="sortCards('name')">Name ▼</span>
        <span class="set" onclick="sortCards('set')">Set ▼</span>
        <span class="id" onclick="sortCards('id')">ID ▼</span>
        <span class="finish" onclick="sortCards('finish')">Finish ▼</span>
        <span class="rarity" onclick="sortCards('rarity')">Rarity ▼</span>
        <span class="price" onclick="sortCards('price-high')">Price ▼</span>
      </div>` + cards.map(c => `
      <div class="card-item${owned(c)}" onclick="showCard('${c.id}')">
        <img src="${getImg(c)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="${imgErr}">
        <span class="name">${c.name}${jpName(c)}</span>
        <span class="set">${c.set || c.setId}</span>
        <span class="id">${c.id}</span>
        <span class="finish">${finishLabel(c)}</span>
        <span class="rarity">${c.rarity || '-'}</span>
        <span class="price">${formatPrice(c)}</span>
      </div>
    `).join('');
  } else if (currentView === 'text') {
    grid.innerHTML = cards.map(c => `
      <div class="card-item${owned(c)}" onclick="showCard('${c.id}')">
        <div class="name">${c.name}${jpName(c)}${c.pricing ? ' · ' + formatPrice(c) : ''}</div>
        <div class="set">${c.set || c.setId} · ${c.id} · ${c.rarity || 'Unknown rarity'}${variant(c)} · ${finishLabel(c)}</div>
        <div class="details">${c.types ? 'Type: ' + c.types.join(', ') : ''} ${c.hp ? '· HP: ' + c.hp : ''}</div>
      </div>
    `).join('');
  } else if (currentView === 'full') {
    grid.innerHTML = cards.map(c => `
      <div class="card-item${owned(c)}" onclick="showCardFromTile(this,'${c.id}')">
        ${collBtn(c)}${flipBtn(c)}${foilBadge(c)}
        <img src="${getImgHigh(c)}" alt="${c.name}" loading="lazy" referrerpolicy="no-referrer" onerror="${imgErr}">
        <div class="info">
          <div class="name">${c.name}${jpName(c)}</div>
          <div class="meta">${c.set || c.setId} · ${c.id} · ${c.rarity || 'Unknown'}${variant(c)} · ${finishLabel(c)}</div>
          ${c.types ? '<div class="types">' + c.types.map(t => '<span class="type-badge">' + t + '</span>').join('') + '</div>' : ''}
          ${c.hp ? '<div class="meta">HP: ' + c.hp + '</div>' : ''}
          ${c.pricing ? '<div class="price">' + formatPrice(c) + '</div>' : ''}
        </div>
      </div>
    `).join('');
  } else {
    grid.innerHTML = cards.map(c => `
      <div class="card-item${owned(c)}" onclick="showCardFromTile(this,'${c.id}')">
        ${collBtn(c)}${flipBtn(c)}${foilBadge(c)}
        <img src="${getImg(c)}" alt="${c.name}" loading="lazy" referrerpolicy="no-referrer">
        <div class="name">${c.name}${jpName(c)}</div>
        <div class="set">${c.id}${variant(c)}</div>
        ${c.pricing ? '<div class="price">' + formatPrice(c) + '</div>' : ''}
      </div>
    `).join('');
  }
  updateStats();
}

function getGameCards() {
  return currentGame === 'all' ? allCards : allCards.filter(c => c.game === currentGame);
}

function doSearch() {
  displayLimit = 60;
  const query = document.getElementById('search').value.toLowerCase().trim();
  if (!query) { filteredCards = getGameCards(); sortCards(document.getElementById('sort').value); updateURL(); return; }
  
  // Normalize query: "st16 003" or "st16003" -> "st16-003"
  const normalizedQuery = query.replace(/([a-z]+)(\d+)\s*(\d+)/i, '$1$2-$3').replace(/\s+/g, '-');
  
  const gameCards = getGameCards();
  filteredCards = gameCards.filter(c => {
    const idNorm = c.id?.toLowerCase().replace(/-/g, '');
    const queryNorm = query.replace(/[\s-]/g, '');
    return c.name?.toLowerCase().includes(query) ||
      c.id?.toLowerCase().includes(query) ||
      c.id?.toLowerCase().includes(normalizedQuery) ||
      idNorm?.includes(queryNorm) ||
      c.localId?.toLowerCase().includes(query) ||
      c.set?.toLowerCase().includes(query) ||
      c.setId?.toLowerCase().includes(query);
  });
  
  // Smart switch: if no results in current game, check other game
  if (!filteredCards.length) {
    const otherGame = currentGame === 'pokemon' ? 'onepiece' : 'pokemon';
    const otherCards = allCards.filter(c => c.game === otherGame);
    const otherResults = otherCards.filter(c => 
      c.name?.toLowerCase().includes(query) ||
      c.id?.toLowerCase().includes(query) ||
      c.localId?.toLowerCase().includes(query)
    );
    if (otherResults.length) {
      filterByGame(otherGame);
      filteredCards = otherResults;
    }
  }
  
  document.getElementById('set-filter').value = '';
  applyFinishFilter();
  sortCards(document.getElementById('sort').value);
  updateURL();
}

function updateURL() {
  const q = document.getElementById('search').value.trim();
  const set = document.getElementById('set-filter').value;
  const params = new URLSearchParams();
  if (q) params.set('q', q);
  if (set) params.set('set', set);
  if (currentGame !== 'pokemon') params.set('game', currentGame);
  const finish = document.getElementById('finish-filter')?.value;
  if (finish) params.set('finish', finish);
  const url = params.toString() ? '?' + params.toString() : location.pathname;
  history.replaceState(null, '', url);
}

function filterBySet(setId) {
  document.getElementById('search').value = '';
  displayLimit = 60;
  const gameCards = getGameCards();
  filteredCards = setId ? gameCards.filter(c => c.setId === setId) : gameCards;
  applyFinishFilter();
  sortCards(document.getElementById('sort').value);
  updateURL();
}

function filterByFinish(finish) {
  displayLimit = 60;
  const setId = document.getElementById('set-filter').value;
  const gameCards = getGameCards();
  filteredCards = setId ? gameCards.filter(c => c.setId === setId) : gameCards;
  applyFinishFilter();
  sortCards(document.getElementById('sort').value);
  updateURL();
}

function applyFinishFilter() {
  const finish = document.getElementById('finish-filter')?.value;
  if (!finish) return;
  if (finish === 'regular') {
    filteredCards = filteredCards.filter(c => c.finish === 'regular' || !c.finish);
  } else if (finish === 'parallel') {
    filteredCards = filteredCards.filter(c => c.finish?.startsWith('parallel'));
  } else if (finish === 'alternate-art') {
    filteredCards = filteredCards.filter(c => c.finish === 'alternate-art');
  } else if (finish === 'foil') {
    filteredCards = filteredCards.filter(c => c.finish && c.finish !== 'regular');
  }
}

function sortCards(by) {
  const getPrice = c => {
    if (c.pricing?.usd) return c.pricing.usd;
    if (c.pricing?.tcgplayer?.normal?.marketPrice) return c.pricing.tcgplayer.normal.marketPrice;
    if (c.pricing?.tcgplayer?.holofoil?.marketPrice) return c.pricing.tcgplayer.holofoil.marketPrice;
    if (c.pricing?.cardmarket?.trend) return c.pricing.cardmarket.trend * 1.08;
    return 0;
  };
  // Sort by full ID with numeric comparison for the number part
  const sortById = (a, b) => (a.id || '').localeCompare(b.id || '', undefined, {numeric: true});
  const finishOrder = ['regular','parallel-1','parallel-2','parallel-3','parallel-4','parallel-5','parallel-6','parallel-7','alternate-art'];
  filteredCards.sort((a, b) => {
    if (by === 'name') return (a.name || '').localeCompare(b.name || '');
    if (by === 'id') return sortById(a, b);
    if (by === 'set') return (a.setId || '').localeCompare(b.setId || '') || sortById(a, b);
    if (by === 'finish') {
      const ai = finishOrder.indexOf(a.finish) === -1 ? 99 : finishOrder.indexOf(a.finish);
      const bi = finishOrder.indexOf(b.finish) === -1 ? 99 : finishOrder.indexOf(b.finish);
      return ai - bi;
    }
    if (by === 'rarity') {
      const ai = rarityOrder.indexOf(a.rarity) === -1 ? 99 : rarityOrder.indexOf(a.rarity);
      const bi = rarityOrder.indexOf(b.rarity) === -1 ? 99 : rarityOrder.indexOf(b.rarity);
      return bi - ai;
    }
    if (by === 'price-high') return getPrice(b) - getPrice(a);
    if (by === 'price-low') return (getPrice(a) || 999999) - (getPrice(b) || 999999);
    return 0;
  });
  renderCards();
}

function setView(view) {
  currentView = view;
  document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  const grid = document.getElementById('results');
  grid.className = 'card-grid' + (view !== 'grid' ? ' ' + view : '');
  renderCards();
}

function filterByGame(game) {
  currentGame = game;
  displayLimit = 60;
  document.querySelectorAll('.game-tab').forEach(t => t.classList.toggle('active', t.dataset.game === game));
  
  // Update set filter to only show sets from selected game
  const setFilter = document.getElementById('set-filter');
  const currentSet = setFilter.value;
  setFilter.innerHTML = '<option value="">All Sets</option>';
  
  const gameCards = game === 'all' ? allCards : allCards.filter(c => c.game === game);
  const sets = [...new Set(gameCards.map(c => c.setId))].sort((a, b) => {
    const normalize = s => s.replace(/(\d+)/g, n => n.padStart(3, '0'));
    return normalize(a).localeCompare(normalize(b));
  });
  sets.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    const setName = gameCards.find(c => c.setId === s)?.set;
    opt.textContent = setName && setName !== s ? `${s} - ${setName}` : s;
    setFilter.appendChild(opt);
  });
  
  // Re-apply current search/filter
  if (document.getElementById('search').value) {
    doSearch();
  } else if (currentSet && sets.includes(currentSet)) {
    setFilter.value = currentSet;
    filterBySet(currentSet);
  } else {
    setFilter.value = '';
    filteredCards = gameCards;
    sortCards(document.getElementById('sort').value);
    updateURL();
  }
}

let currentCard = null;
let showingJp = true;

function showCard(id, isEn) {
  const card = allCards.find(c => c.id === id);
  if (!card) return;
  currentCard = card;
  
  const proxyImg = url => url?.includes('onepiece-cardgame.com') ? `https://wsrv.nl/?url=${encodeURIComponent(url)}` : url;
  const getImg = c => isEn && c.imgEn ? proxyImg(c.imgEn) : proxyImg(c.imgJp) || (c.game === 'onepiece' ? proxyImg(c.img) : c.image + '/high.webp') || 'onepiece/images/card-back.png';
  
  document.getElementById('modal-title').textContent = card.name;
  document.getElementById('modal-img').src = getImg(card);
  document.getElementById('modal-name').textContent = card.name + (card.nameJp ? ' ' + card.nameJp : '');
  document.getElementById('modal-set').textContent = card.set || card.setId;
  document.getElementById('modal-id').textContent = card.id;
  document.getElementById('modal-rarity').textContent = card.rarity || '-';
  
  // Finish label
  const finishLabel = f => {
    if (!f) return '?';
    if (f === 'regular') return 'Regular';
    if (f === 'alternate-art') return 'Alternate Art';
    if (f.startsWith('parallel')) return f.replace('parallel-','Parallel ');
    return f;
  };
  document.getElementById('modal-finish').textContent = finishLabel(card.finish);
  
  // Hide flip button in modal (flip is on tiles only)
  document.getElementById('flip-btn').style.display = 'none';
  
  // Game-specific extra info
  const extraLabel = document.getElementById('modal-extra-label');
  const extra = document.getElementById('modal-extra');
  if (card.game === 'onepiece') {
    extraLabel.textContent = 'Details';
    const parts = [card.type, card.color, card.power ? `${card.power} PWR` : '', card.cost ? `Cost ${card.cost}` : '', card.counter ? `+${card.counter} Counter` : '', card.trait, card.attribute].filter(Boolean);
    extra.textContent = parts.join(' · ');
    extraLabel.style.display = extra.style.display = '';
  } else if (card.hp) {
    extraLabel.textContent = 'HP';
    extra.textContent = card.hp + (card.types?.length ? ' · ' + card.types.join('/') : '');
    extraLabel.style.display = extra.style.display = '';
  } else {
    extraLabel.style.display = extra.style.display = 'none';
  }
  
  // Price with variants
  let priceHtml = card.pricing ? formatPrice(card) : 'No price data';
  if (card.variants?.length > 1) {
    priceHtml += '<br><small style="color:#666">';
    priceHtml += card.variants.slice(1).map(v => `${v.label || 'Alt'}: $${v.usd?.toFixed(2) || '?'}`).join(' · ');
    priceHtml += '</small>';
  }
  document.getElementById('modal-price').innerHTML = priceHtml;
  document.getElementById('modal').classList.add('active');
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }

function flipCard() {
  if (!currentCard) return;
  const img = document.getElementById('modal-img');
  const btn = document.getElementById('flip-btn');
  const proxyImg = url => url ? `https://wsrv.nl/?url=${encodeURIComponent(url)}` : null;
  
  showingJp = !showingJp;
  if (showingJp) {
    img.src = proxyImg(currentCard.imgJp || currentCard.img);
    btn.textContent = '🔄 EN';
  } else {
    img.src = proxyImg(currentCard.imgEn);
    btn.textContent = '🔄 JP';
  }
}

function flipTile(e, btn) {
  e.stopPropagation();
  const img = btn.parentElement.querySelector('img');
  const isJp = btn.textContent === 'EN';
  img.src = isJp ? btn.dataset.en : btn.dataset.jp;
  btn.textContent = isJp ? 'JP' : 'EN';
}

function showCardFromTile(tile, id) {
  const flipBtn = tile.querySelector('.flip-tile');
  const isEn = flipBtn && flipBtn.textContent === 'JP';
  showCard(id, isEn);
}

function clearSearch() {
  document.getElementById('search').value = '';
  document.getElementById('set-filter').value = '';
  filteredCards = getGameCards();
  renderCards();
  updateStats();
}

// Events
document.getElementById('search').addEventListener('input', doSearch);
document.getElementById('search').addEventListener('keydown', e => { if (e.key === 'Enter') e.preventDefault(); });
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadCards();
collectionStore._updateCount(); // Initialize collection count
</script>
