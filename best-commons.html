<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Best Common Cards | Japan TCG Price Guide</title>
<link rel="stylesheet" href="/japan-tcg-price-guide/base.css">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;padding:15px}
h1{font-size:1.5em;margin-bottom:5px}
.subtitle{color:#666;margin-bottom:20px}
.tabs{display:flex;gap:10px;margin-bottom:20px}
.tab{padding:10px 20px;border-radius:20px;cursor:pointer;border:2px solid #ddd;background:#fff}
.tab.active{background:#222;color:#fff;border-color:#222}
.card-list{display:grid;gap:10px}
.card-row{display:flex;align-items:center;background:#fff;padding:12px 15px;border-radius:8px;gap:15px}
.rank{font-weight:bold;color:#888;width:25px}
.card-info{flex:1}
.card-name{font-weight:600}
.card-set{font-size:.85em;color:#666}
.card-price{font-weight:bold;color:#2a2}
</style>
</head>
<body>
<script src="/japan-tcg-price-guide/components/header.js"></script>

<h1>💎 Best Common Cards</h1>
<p class="subtitle">Top 20 commons by market value - hidden gems for collectors</p>

<div class="tabs">
  <div class="tab active" onclick="showGame('onepiece')">One Piece</div>
  <div class="tab" onclick="showGame('pokemon')">Pokémon</div>
</div>

<div id="list" class="card-list"></div>

<script>
const BASE = '/japan-tcg-price-guide';
let opData = null, pkData = null;

async function loadData() {
  opData = await fetch(`${BASE}/data/onepiece-cache.json`).then(r => r.json());
  const shards = ['sv','swsh','sm','xy','bw','dp','ex','vintage'];
  pkData = { sets: {} };
  for (const s of shards) {
    const d = await fetch(`${BASE}/data/shards/${s}.json`).then(r => r.json());
    Object.assign(pkData.sets, d.sets);
  }
  showGame('onepiece');
}

function showGame(game) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  
  const commons = [];
  const data = game === 'onepiece' ? opData : pkData;
  const rarityMatch = game === 'onepiece' ? 'C' : 'Common';
  
  for (const [setId, cards] of Object.entries(data.sets)) {
    for (const card of cards) {
      const price = card.pricing?.usd || card.pricing?.eur;
      if (card.rarity === rarityMatch && price) {
        commons.push({ ...card, setId, price });
      }
    }
  }
  
  commons.sort((a,b) => b.price - a.price);
  const top20 = commons.slice(0, 20);
  
  const currency = game === 'onepiece' ? '$' : '€';
  document.getElementById('list').innerHTML = top20.map((c, i) => `
    <a href="${BASE}/search.html?game=${game}&q=${encodeURIComponent(c.id)}" class="card-row" style="text-decoration:none;color:inherit">
      <span class="rank">#${i+1}</span>
      <div class="card-info">
        <div class="card-name">${c.name}</div>
        <div class="card-set">${c.id} · ${c.setId}</div>
      </div>
      <span class="card-price">${currency}${c.price.toFixed(2)}</span>
    </a>
  `).join('');
}

loadData();
</script>
<footer id="site-footer"></footer>
<script src="/japan-tcg-price-guide/components/footer.js"></script>
</body>
</html>
