<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Price Alerts - Japan TCG Price Guide</title>
  <link rel="stylesheet" href="base.css">
  <style>
    .container{max-width:800px;margin:0 auto;padding:20px}
    h1{font-size:1.5em;margin-bottom:20px}
    .alert-card{background:#fff;border-radius:10px;padding:15px;margin-bottom:10px;display:flex;align-items:center;gap:15px}
    .alert-card img{width:60px;height:84px;object-fit:cover;border-radius:4px}
    .alert-info{flex:1}
    .alert-name{font-weight:600;margin-bottom:5px}
    .alert-prices{font-size:.9em;color:#666}
    .alert-target{color:#2e7d32;font-weight:600}
    .alert-delete{background:none;border:none;font-size:1.2em;cursor:pointer;padding:5px}
    .empty{text-align:center;padding:40px;color:#666}
  </style>
</head>
<body>
<header id="site-header"></header>
<div class="container">
  <h1>🔔 My Price Alerts</h1>
  <div id="alertsList"></div>
</div>
<footer id="site-footer"></footer>
<script src="/japan-tcg-price-guide/components/header.js"></script>
<script src="/japan-tcg-price-guide/components/footer.js"></script>
<script>
const alerts = JSON.parse(localStorage.getItem("tcg_alerts") || "{}");
const list = document.getElementById("alertsList");

if (!Object.keys(alerts).length) {
  list.innerHTML = '<div class="empty">No price alerts set.<br><br>Browse cards and click 🔔 to set alerts.</div>';
} else {
  list.innerHTML = Object.entries(alerts).map(([id, a]) => `
    <div class="alert-card">
      <a href="search.html?q=${encodeURIComponent(id)}"><div style="width:60px;height:84px;background:#eee;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.5em;color:#999">${id}</div></a>
      <div class="alert-info">
        <div class="alert-name">${a.name}</div>
        <div class="alert-prices">
          Set at: $${a.setPrice?.toFixed(2) || '?'} → Target: <span class="alert-target">$${a.target?.toFixed(2)}</span>
        </div>
      </div>
      <button class="alert-delete" onclick="deleteAlert('${id}')" title="Remove alert">🗑️</button>
    </div>
  `).join("");
}

function deleteAlert(id) {
  const alerts = JSON.parse(localStorage.getItem("tcg_alerts") || "{}");
  delete alerts[id];
  localStorage.setItem("tcg_alerts", JSON.stringify(alerts));
  location.reload();
}
</script>
</body>
</html>
