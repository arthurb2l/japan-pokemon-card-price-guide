name: Data Brain Sync

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC (3 PM JST)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Health Check
        run: node scripts/data-brain/cli.js health
      
      - name: Sync Popular Sets
        id: sync
        continue-on-error: true
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const brain = require('./scripts/data-brain');
          
          // Priority sets (TCGdex format)
          const SETS = ['sv01', 'sv02', 'sv03', 'sv04', 'sv05'];
          const MAX_CARDS_PER_SET = 10;
          
          async function main() {
            const results = { updated: new Date().toISOString(), sets: {} };
            
            for (const setId of SETS) {
              console.log(`\n📦 Processing ${setId}...`);
              const cards = [];
              
              for (let i = 1; i <= MAX_CARDS_PER_SET; i++) {
                const cardId = `${setId}-${String(i).padStart(3, '0')}`;
                try {
                  const card = await brain.getCard(cardId);
                  if (card.name) cards.push(card);
                } catch (e) {}
              }
              
              if (cards.length > 0) {
                results.sets[setId] = cards;
                console.log(`  ✅ Got ${cards.length} cards`);
              }
            }
            
            fs.writeFileSync('data/brain-cache.json', JSON.stringify(results, null, 2));
            console.log('\n✅ Sync complete');
          }
          
          main().catch(e => { console.error(e); process.exit(1); });
          SCRIPT
      
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "🧠 Data Brain sync $(date +%Y-%m-%d)"
          git push

      - name: Self-heal on failure
        if: steps.sync.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check for existing open issue
          EXISTING=$(gh issue list --label "self-healing" --state open --json number -q 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Self-healing issue already open"
            exit 0
          fi
          
          gh issue create \
            --title "🔴 Data Brain sync failed - $(date +%Y-%m-%d)" \
            --body "## Sync Failure

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Time:** $(date -u)

          Please investigate and manually trigger sync when fixed.

          /cc @arthurb2l" \
            --label "bug,automated,self-healing"
