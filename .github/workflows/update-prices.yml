name: Update Prices from API

on:
  schedule:
    - cron: '0 0 1 * *'  # 1st of each month
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch prices and update data
        env:
          POKEMON_API_KEY: ${{ secrets.POKEMON_API_KEY }}
        run: |
          node << 'SCRIPT'
          const fs = require('fs');
          const https = require('https');
          
          // Cards to track (tcgPlayerId from PokemonPriceTracker - English versions)
          const CARDS = [
            { id: '246723', name: 'Umbreon VMAX Alt Art' },
            { id: '246733', name: 'Rayquaza VMAX Alt Art' },
            { id: '42479', name: 'Charizard Base Set Holo' },
            { id: '264206', name: 'Umbreon VMAX Trainer Gallery' },
          ];
          
          const API_KEY = process.env.POKEMON_API_KEY;
          if (!API_KEY) {
            console.log('No API key set - skipping price update');
            console.log('Set POKEMON_API_KEY secret to enable auto-updates');
            process.exit(0);
          }
          
          async function fetchPrice(tcgPlayerId) {
            return new Promise((resolve, reject) => {
              const url = `https://www.pokemonpricetracker.com/api/v2/cards?tcgPlayerId=${tcgPlayerId}&language=japanese`;
              const options = { headers: { 'Authorization': `Bearer ${API_KEY}` } };
              
              https.get(url, options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const json = JSON.parse(data);
                    resolve(json.data?.[0]?.prices?.market || null);
                  } catch (e) { resolve(null); }
                });
              }).on('error', reject);
            });
          }
          
          async function main() {
            const prices = JSON.parse(fs.readFileSync('data/prices.json', 'utf8'));
            let updated = false;
            
            for (const card of CARDS) {
              const price = await fetchPrice(card.id);
              if (price) {
                console.log(`${card.name}: $${price}`);
                // Update prices.json with new US market price
                const existing = prices.cards.find(c => c.tcgPlayerId === card.id);
                if (existing && Math.abs(existing.market_usd - price) / price > 0.1) {
                  existing.market_usd = price;
                  existing.last_updated = new Date().toISOString().split('T')[0];
                  updated = true;
                }
              }
            }
            
            if (updated) {
              fs.writeFileSync('data/prices.json', JSON.stringify(prices, null, 2));
              console.log('Prices updated');
            } else {
              console.log('No significant price changes');
            }
          }
          
          main().catch(console.error);
          SCRIPT
          
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "Auto-update prices from API 🤖"
          git push
