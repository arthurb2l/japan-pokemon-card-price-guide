name: Self-Healing Monitor

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC (3pm JST)
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check data freshness
        id: freshness
        run: |
          if [ ! -f data/brain-cache.json ]; then
            echo "status=missing" >> $GITHUB_OUTPUT
            exit 0
          fi
          LAST_SYNC=$(jq -r '.lastSync // empty' data/brain-cache.json)
          if [ -z "$LAST_SYNC" ]; then
            echo "status=unknown" >> $GITHUB_OUTPUT
            exit 0
          fi
          SYNC_EPOCH=$(date -d "$LAST_SYNC" +%s 2>/dev/null || echo 0)
          DAYS_OLD=$(( ($(date +%s) - SYNC_EPOCH) / 86400 ))
          if [ "$DAYS_OLD" -gt 7 ]; then
            echo "status=stale" >> $GITHUB_OUTPUT
            echo "days=$DAYS_OLD" >> $GITHUB_OUTPUT
          else
            echo "status=fresh" >> $GITHUB_OUTPUT
          fi
      
      - name: Check API health
        id: api
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://api.tcgdex.net/v2/en/sets/sv01")
          echo "tcgdex=$([[ $CODE == 200 ]] && echo up || echo down)" >> $GITHUB_OUTPUT
      
      - name: Check JSON validity
        id: json
        run: |
          ERRORS=""
          for f in data/*.json; do
            python3 -c "import json; json.load(open('$f'))" 2>/dev/null || ERRORS="$ERRORS $f"
          done
          echo "invalid=$ERRORS" >> $GITHUB_OUTPUT
      
      - name: Check pages return 200
        id: pages
        run: |
          BASE="https://arthurb2l.github.io/japan-tcg-price-guide"
          ERRORS=""
          for p in index.html pokemon/index.html guides/best-packs.html; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/$p")
            [[ $CODE != 200 ]] && ERRORS="$ERRORS $p"
          done
          echo "broken=$ERRORS" >> $GITHUB_OUTPUT
      
      - name: Create issue if problems
        if: steps.freshness.outputs.status == 'stale' || steps.api.outputs.tcgdex == 'down' || steps.json.outputs.invalid != '' || steps.pages.outputs.broken != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip if issue exists
          [ $(gh issue list --label "self-healing" --state open --json number -q 'length') -gt 0 ] && exit 0
          
          gh issue create \
            --title "⚠️ Health alert - $(date +%Y-%m-%d)" \
            --label "automated,self-healing" \
            --body "## Health Check Failed

          | Check | Status |
          |-------|--------|
          | Data | ${{ steps.freshness.outputs.status }} ${{ steps.freshness.outputs.days }}d |
          | TCGdex | ${{ steps.api.outputs.tcgdex }} |
          | Invalid JSON | ${{ steps.json.outputs.invalid }} |
          | Broken pages | ${{ steps.pages.outputs.broken }} |

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
