name: Update Sitemap

on:
  push:
    paths:
      - '**.html'
  workflow_dispatch:

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate sitemap
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml
          
          TODAY=$(date +%Y-%m-%d)
          BASE="https://arthurb2l.github.io/japan-tcg-price-guide"
          
          # Add index.html
          echo "  <url><loc>$BASE/</loc><lastmod>$TODAY</lastmod><priority>1.0</priority></url>" >> sitemap.xml
          
          # Add all other HTML files
          for file in $(find . -name "*.html" -not -name "index.html" -not -path "./.git/*" | sort); do
            path="${file#./}"
            echo "  <url><loc>$BASE/$path</loc><lastmod>$TODAY</lastmod><priority>0.8</priority></url>" >> sitemap.xml
          done
          
          echo '</urlset>' >> sitemap.xml
          echo "Generated sitemap with $(grep -c '<url>' sitemap.xml) URLs"
      
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update sitemap [skip ci]"
            git pull --rebase origin main || true
          git push || echo "Push failed, skipping"
          fi
