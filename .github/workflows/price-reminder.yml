name: Monthly Price Reminder

on:
  schedule:
    - cron: '0 0 1 * *'  # 1st of each month at 00:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Create price update reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Monthly Price Update - ${date}`,
              body: `## Monthly price check reminder\n\nTime to update prices in:\n- [ ] data/sets.json (box/pack prices)\n- [ ] data/prices.json (individual cards)\n\n### Sources\n- [Mercari JP](https://jp.mercari.com/)\n- [Yahoo Auctions JP](https://auctions.yahoo.co.jp/)\n- [Price Charting](https://www.pricecharting.com/)\n\n*Auto-generated by Agent #5*`,
              labels: ['data']
            });
            console.log('Created reminder issue for', date);
