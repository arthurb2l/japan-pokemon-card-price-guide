name: Weekly Health Check

on:
  schedule:
    - cron: '0 15 * * 0'  # Sunday 15:00 UTC = Monday 00:00 JST
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check JSON validity
        id: json
        run: |
          errors=""
          for f in data/*.json; do
            if ! python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              errors="$errors\n❌ Invalid JSON: $f"
            fi
          done
          echo "json_errors=$errors" >> $GITHUB_OUTPUT
          
      - name: Check pages return 200
        id: pages
        run: |
          base="https://arthurb2l.github.io/japan-pokemon-card-price-guide"
          errors=""
          for page in index.html guides/best-packs.html guides/most-valuable-cards.html; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$base/$page")
            if [ "$code" != "200" ]; then
              errors="$errors\n❌ $page returned $code"
            fi
          done
          # Check 3 random set pages
          for set in eevee-heroes pokemon-151 shiny-treasure-ex; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$base/sets/$set.html")
            if [ "$code" != "200" ]; then
              errors="$errors\n❌ sets/$set.html returned $code"
            fi
          done
          echo "page_errors=$errors" >> $GITHUB_OUTPUT
          
      - name: Check sitemap matches files
        id: sitemap
        run: |
          errors=""
          if [ ! -f sitemap.xml ]; then
            errors="❌ sitemap.xml missing"
          fi
          echo "sitemap_errors=$errors" >> $GITHUB_OUTPUT
          
      - name: Report results
        run: |
          echo "## 🏥 Health Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -z "${{ steps.json.outputs.json_errors }}${{ steps.pages.outputs.page_errors }}${{ steps.sitemap.outputs.sitemap_errors }}" ]; then
            echo "✅ All checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Issues Found:" >> $GITHUB_STEP_SUMMARY
            echo -e "${{ steps.json.outputs.json_errors }}" >> $GITHUB_STEP_SUMMARY
            echo -e "${{ steps.pages.outputs.page_errors }}" >> $GITHUB_STEP_SUMMARY
            echo -e "${{ steps.sitemap.outputs.sitemap_errors }}" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
