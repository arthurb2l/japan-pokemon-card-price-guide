name: Generate Set Pages

on:
  push:
    paths:
      - 'data/sets.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate set pages from JSON
        run: |
          mkdir -p sets
          node << 'SCRIPT'
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('data/sets.json', 'utf8'));
          
          data.sets.forEach(set => {
            const status = set.in_print 
              ? '<span style="color:#4ecdc4">✅ In Print</span>'
              : '<span style="color:#ff6b6b">🔥 Out of Print</span>';
            const evWidth = set.ev_rating * 20;
            
            const html = `<!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>${set.name_en} (${set.name_jp}) | Japanese Pokemon Card Set Guide</title>
          <meta name="description" content="${set.name_en} (${set.name_jp}) Pokemon card set guide. Chase cards, pack prices, box values.">
          <link rel="canonical" href="https://arthurb2l.github.io/japan-pokemon-card-price-guide/sets/${set.id}.html">
          <style>
          *{margin:0;padding:0;box-sizing:border-box}
          body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#e0e0e0;padding:20px;max-width:800px;margin:0 auto}
          a{color:#4ecdc4}
          h1{color:#ffd700;margin-bottom:5px}
          .jp{color:#a855f7;font-size:1.2em;margin-bottom:20px}
          .breadcrumb{margin-bottom:20px;font-size:.9em}
          .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin:20px 0}
          .stat{background:#16213e;padding:15px;border-radius:8px;text-align:center}
          .stat-label{color:#888;font-size:.8em}
          .stat-value{color:#4ecdc4;font-size:1.4em;font-weight:bold}
          .section{background:#16213e;padding:15px;border-radius:8px;margin:15px 0}
          .section h2{color:#ff6b6b;margin-bottom:10px;font-size:1.1em}
          .ev-bar{background:#2a2a4a;border-radius:4px;height:12px;width:100%}
          .ev-fill{background:linear-gradient(90deg,#ff6b6b,#ffd700);height:100%;border-radius:4px}
          footer{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid #2a2a4a;color:#666;font-size:.8em}
          </style>
          </head>
          <body>
          <div class="breadcrumb"><a href="../">← Price Guide</a> / <a href="../guides/best-packs.html">Best Packs</a></div>
          <h1>${set.name_en}</h1>
          <div class="jp">${set.name_jp} (${set.code})</div>
          <p>Release: ${set.release_date} | Status: ${status}</p>
          <div class="stats">
          <div class="stat"><div class="stat-label">Pack MSRP</div><div class="stat-value">¥${set.msrp_pack || 'N/A'}</div></div>
          <div class="stat"><div class="stat-label">Pack Market</div><div class="stat-value">¥${set.market_pack || 'N/A'}</div></div>
          <div class="stat"><div class="stat-label">Box MSRP</div><div class="stat-value">¥${set.msrp_box}</div></div>
          <div class="stat"><div class="stat-label">Box Market</div><div class="stat-value">¥${set.market_box}</div></div>
          </div>
          <div class="section">
          <h2>🎯 Chase Cards</h2>
          <p>${set.chase_cards.join(', ')}</p>
          </div>
          <div class="section">
          <h2>📊 Expected Value Rating</h2>
          <div class="ev-bar"><div class="ev-fill" style="width:${evWidth}%"></div></div>
          <p style="margin-top:8px">${set.ev_rating}/5 — ${set.type} set</p>
          </div>
          <footer>
          <p><a href="../guides/best-packs.html">← Compare All Packs</a></p>
          <p>Auto-generated from <a href="../data/sets.json">sets.json</a></p>
          </footer>
          </body>
          </html>`;
            
            fs.writeFileSync(`sets/${set.id}.html`, html);
            console.log(`Generated sets/${set.id}.html`);
          });
          SCRIPT
          
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sets/
          git diff --staged --quiet || git commit -m "Auto-generate set pages from sets.json 🤖"
          git pull --rebase origin main || true
          git push || echo "Push failed, skipping"
